apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dejavu-tacos-tls
  namespace: temporal-dejavu-tacos
spec:
  dnsNames:
    - dejavu-tacos.tmprl-demo.cloud
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt
  privateKey:
    rotationPolicy: Always
  secretName: dejavu-tacos-tls
